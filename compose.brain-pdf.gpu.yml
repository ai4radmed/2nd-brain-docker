# compose.brain-pdf.gpu.yml — GPU passthrough overlay for brain-pdf.
#
# **직접 사용 ✗** — `scripts/detect-compose.sh` 가 nvidia-smi + docker runtime 검사 후
# 자동으로 `-f compose.brain-pdf.gpu.yml` 을 추가. 운영 시 `make build-brain-pdf` /
# `make run-brain-pdf` 만 호출 — 양 PC 에서 같은 명령으로 적절한 변형 선택.
#
# 본 파일은 양 PC (데스크탑 kimbi RTX 3060 / 노트북 Intel Arc) 에 git 동기되지만,
# 노트북에서는 detect 가 활성화 안 함 → 무해. 어댑터 패턴.
#
# 강제 토글 (드물게):
#   BRAIN_PDF_FORCE_VARIANT=gpu make ...    감지 실패 시 강제 활성
#   BRAIN_PDF_FORCE_VARIANT=cpu make ...    NVIDIA 있는 PC 에서 강제 비활성
#
# GPU 호스트 전제 (desktop only, 1회 셋업):
#   1. WSL2 안 nvidia-smi 정상 (RTX 시리즈 + Driver + CUDA runtime)
#   2. nvidia-container-toolkit 설치됨 (`sudo apt-get install nvidia-container-toolkit`)
#   3. Docker daemon 에 nvidia runtime 등록됨 (`sudo nvidia-ctk runtime configure --runtime=docker` + restart)
#   4. `docker run --rm --gpus all nvidia/cuda:12.0.0-base nvidia-smi` 통과
# 노트북 (Intel Arc) — 위 전제 불필요. NVIDIA 스택 미설치 정상.

services:
  brain-pdf:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

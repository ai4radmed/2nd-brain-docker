services:
  claude:
    build:
      context: ./images/claude-cli
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
        CLAUDE_CODE_VERSION: ${CLAUDE_CODE_VERSION:?CLAUDE_CODE_VERSION must be set in .env (do not use latest)}
    image: 2nd-brain/claude-cli:${CLAUDE_CODE_VERSION}
    container_name: sb-claude
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /home/user/projects/2nd-brain-vault
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    environment:
      CLAUDE_CONFIG_DIR: /home/user/.claude
      NODE_OPTIONS: "--max-old-space-size=4096"
      # claude.ai 계정 레벨 connector(Gmail/Calendar/Drive) 자동 로드 차단.
      # Google Workspace 는 호스트의 gog CLI 로 일원화 — claude.ai connector 는
      # 기능 불완전 + cache 무효화 비용만 발생. 개별 disable 미지원이라 통째로 OFF
      # (anthropics/claude-code#29368, #50062 참조).
      ENABLE_CLAUDEAI_MCP_SERVERS: "false"
      # 컨테이너 내 self-update 차단. 버전은 ${CLAUDE_CODE_VERSION} 핀으로
      # 빌드 시점에 결정되며, 갱신은 .env 수정 + `make build` 재빌드만으로 한다.
      # 런타임 self-update 는 컨테이너 쓰기 레이어로 들어가 휘발 + 불변성 침해.
      DISABLE_AUTOUPDATER: "1"
    stdin_open: true
    tty: true
    restart: unless-stopped
    volumes:
      - ${SB_DATA:-${HOME}/projects/2nd-brain-vault}:/home/user/projects/2nd-brain-vault
      - ${SB_GUIDE:-${HOME}/projects/2nd-brain-vault-guide}:/home/user/projects/2nd-brain-vault-guide
      - claude-state:/home/user/.claude

volumes:
  claude-state:

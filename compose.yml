x-claude-base: &claude-base
  build:
    context: ./images/claude-cli
    args:
      UID: ${UID:-1000}
      GID: ${GID:-1000}
      CLAUDE_CODE_VERSION: ${CLAUDE_CODE_VERSION:-latest}
  image: 2nd-brain/claude-cli:latest
  user: "${UID:-1000}:${GID:-1000}"
  working_dir: /workspace/2nd-brain-vault
  cap_drop: [ALL]
  security_opt:
    - no-new-privileges:true
  read_only: true
  tmpfs:
    - /tmp
    - /run
  mem_limit: 4g
  cpus: 2
  stdin_open: true
  tty: true
  environment:
    DISABLE_AUTOUPDATER: "1"
    CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"

services:
  claude:
    <<: *claude-base
    profiles: [rw]
    container_name: sb-claude
    volumes:
      - ${SB_DATA:-${HOME}/projects/2nd-brain-vault}:/workspace/2nd-brain-vault
      - ${SB_GUIDE:-${HOME}/projects/2nd-brain-vault-guide}:/workspace/2nd-brain-vault-guide:ro
      - claude-state:/home/user/.claude

  claude-ro:
    <<: *claude-base
    profiles: [ro]
    container_name: sb-claude-ro
    volumes:
      - ${SB_DATA:-${HOME}/projects/2nd-brain-vault}:/workspace/2nd-brain-vault:ro
      - ${SB_GUIDE:-${HOME}/projects/2nd-brain-vault-guide}:/workspace/2nd-brain-vault-guide:ro
      - claude-state:/home/user/.claude

volumes:
  claude-state:

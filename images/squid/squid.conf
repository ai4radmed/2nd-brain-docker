# 2nd-brain-docker egress proxy
# Domain whitelist via CONNECT (no TLS interception, no caching).

http_port 3128

# No caching — we proxy, we don't store.
cache deny all

# Whitelisted destinations (D1 — same list for build and runtime).
# Leading dot = match domain itself + all subdomains. Squid 6 rejects redundant pairs.
acl whitelist dstdomain .anthropic.com
acl whitelist dstdomain .claude.ai
acl whitelist dstdomain .claude.com
acl whitelist dstdomain .npmjs.org
acl whitelist dstdomain .github.com
acl whitelist dstdomain .githubusercontent.com

# Restrict CONNECT to HTTPS port only.
acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl CONNECT method CONNECT

http_access deny CONNECT !SSL_ports
http_access deny !Safe_ports

# Allow whitelisted, deny everything else.
http_access allow whitelist
http_access deny all

# Logging — keep on; review during early operation to widen whitelist iteratively.
access_log /var/log/squid/access.log
cache_log stdio:/dev/stdout

# Privacy: do not leak client info to upstream.
forwarded_for off
via off

dns_v4_first on

pid_filename /var/run/squid/squid.pid
